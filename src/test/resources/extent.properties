extent.reporter.spark.start=true
extent.reporter.spark.out=target/SparkReport/ExtentReport.html
# Add this line to link your XML config
extent.reporter.spark.config=src/test/resources/extent-config.xml

# Enable screenshots
screenshot.directory=target/SparkReport/
#screenshot.relativetopath=true

# This fixes the "Broken Image" icon issue
extent.reporter.spark.base64imagesrc=true

# Optional: To keep a history of reports (adds timestamp to folder names)
# extent.reporter.spark.vieworder=dashboard,test,category,author,device